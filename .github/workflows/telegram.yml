name: Telegram Reminder

on:
  workflow_dispatch:

jobs:
  telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Test Telegram
        run: |
          curl -v -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="Hola Gustavo desde GitHub 🚀"
