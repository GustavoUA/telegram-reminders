name: Telegram Test

on:
  workflow_dispatch:

jobs:
  telegram:
    runs-on: ubuntu-latest

    env:
      TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Test Telegram
        run: |
          curl --fail --silent --show-error \
            -X POST \
            "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=🚀 GitHub Actions funciona correctamente"
