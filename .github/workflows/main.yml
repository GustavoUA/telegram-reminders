name: Telegram

on:
  schedule:
    - cron: '*/15 * * * *'   # Cada 15 minutos
  workflow_dispatch:

jobs:
  telegram:
    runs-on: ubuntu-latest

    env:
      TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

    steps:
      - name: Enviar mensaje a Telegram
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=8163056130" \
            --data-urlencode "text=Hola desde GitHub. Workflow ejecutado correctamente."
